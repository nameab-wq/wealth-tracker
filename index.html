<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Wealth Tracker</title>
<style>
:root {
  --bg:#f5f5f5;--card:#fff;--border:#e0e0e0;--text:#1a1a1a;--muted:#666;
  --accent:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#d97706;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;padding-bottom:80px;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
header h1{font-size:18px;font-weight:700;}
.sync-btn{margin-left:auto;background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--muted);}
.sync-btn:hover{border-color:var(--accent);color:var(--accent);}
.sync-btn.spinning{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1;background:none;border:none;padding:12px 4px 8px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
nav button .ico{font-size:20px;}
nav button.active{color:var(--accent);}
main{max-width:960px;margin:20px auto;padding:0 14px;}
.page{display:none;}.page.active{display:block;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.card .value{font-size:22px;font-weight:700;}
.card .sub{font-size:11px;color:var(--muted);margin-top:3px;}
.green{color:var(--green);}.red{color:var(--red);}.blue{color:var(--accent);}
.section{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px;}
.section h2{font-size:15px;font-weight:600;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--muted);font-weight:500;padding:7px 8px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;}
td{padding:9px 8px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:500;}
.badge.expense{background:#fee2e2;color:var(--red);}
.badge.income{background:#dcfce7;color:var(--green);}
.badge.subscription{background:#fef3c7;color:var(--yellow);}
form.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
form.grid .full{grid-column:1/-1;}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
input,select{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border .15s;}
input:focus,select:focus{border-color:var(--accent);}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}.btn.danger{background:var(--red);}.btn.ghost{background:none;border:1px solid var(--border);color:var(--text);}
.btn.sm{padding:4px 10px;font-size:12px;}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{width:auto;min-width:110px;}
.empty{text-align:center;color:var(--muted);padding:24px 0;font-size:13px;}
.tag-income{color:var(--green);font-weight:600;}
.tag-expense{color:var(--red);font-weight:600;}
.prow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.prow:last-child{border:none;}
.prow .name{font-weight:600;font-size:14px;}
.prow .sub2{font-size:11px;color:var(--muted);margin-top:2px;}
.prow .price{font-size:14px;font-weight:600;}
.prow .chg.pos{color:var(--green);font-size:12px;}.prow .chg.neg{color:var(--red);font-size:12px;}
.chip{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:11px;}
.ibadge{background:#dcfce7;color:var(--green);border-radius:6px;padding:1px 7px;font-size:11px;}
.month-sel{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
.month-sel select{width:auto;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:10px;}
@media(max-width:540px){form.grid{grid-template-columns:1fr;} .cards{grid-template-columns:1fr 1fr;} table{font-size:12px;} td,th{padding:7px 5px;}}

  #pin-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f5;z-index:9999;display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .pin-box{background:var(--card);border-radius:var(--radius);padding:36px 32px;box-shadow:var(--shadow);text-align:center;max-width:320px;width:90%;}
  .pin-box h2{font-size:20px;font-weight:700;margin-bottom:6px;}
  .pin-box p{color:var(--muted);font-size:13px;margin-bottom:20px;}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border);transition:background .15s;}
  .pin-dot.filled{background:var(--accent);}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .pin-key{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:20px;font-weight:600;cursor:pointer;transition:background .1s;}
  .pin-key:hover{background:var(--border);}
  .pin-error{color:var(--red);font-size:13px;margin-top:10px;min-height:18px;}
  .sync-indicator{font-size:11px;color:var(--muted);margin-left:8px;}
  .sync-indicator.syncing{color:var(--accent);}
  .sync-indicator.error{color:var(--red);}
</style>

<script>
window.addEventListener("load", function() {
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPA_URL = "https://ddmposnxfyhgxvyyqswx.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXBvc254ZnloZ3h2eXlxc3d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Nzg4OTQsImV4cCI6MjA4OTI1NDg5NH0.ygxwrkJQHq9LAasa8kN9u87tUB2kMSx0Qc4zjfF6wmQ";
const PIN_HASH_KEY = "wt_pin_hash";
const SESSION_KEY  = "wt_session";
const SESSION_TTL  = 8 * 60 * 60 * 1000; // 8 hours

// ── SUPABASE CLIENT ───────────────────────────────────────────────────────────
let sb = null;
function initSupabase() {
  try {
    // supabase-js v2 exposes different globals depending on build/browser
    const client = (typeof supabase !== "undefined" && supabase.createClient)
      ? supabase
      : (typeof window.supabase !== "undefined" ? window.supabase : null);
    if (!client) { console.warn("Supabase library not loaded"); return false; }
    sb = client.createClient(SUPA_URL, SUPA_KEY);
    console.log("Supabase initialized OK");
    return true;
  } catch(e) {
    console.warn("Supabase failed to init:", e);
    return false;
  }
}

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const EXPENSE_CATS = ['🏠 Housing','🛒 Groceries','🍽️ Dining','🚗 Transport','💊 Health','👗 Clothing','🎮 Entertainment','📚 Education','✈️ Travel','💡 Utilities','📱 Tech','🎁 Gifts Given','🐾 Pets','💼 Work','🔧 Repairs','💰 Fees','❓ Other'];
const INCOME_TYPES = {wage:'Wage/Salary',earnings:'Freelance/Earnings',gift:'Gift/Cash',investment_return:'Investment Return'};

// ── PIN LOGIC ─────────────────────────────────────────────────────────────────
let pinBuffer = "";
let pinConfirm = "";
let pinMode = "check"; // "check" | "set_first" | "set_confirm"

async function hashPin(pin) {
  try {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin + "wt_salt_2026"));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  } catch(e) {
    // Fallback for non-HTTPS or older browsers: simple obfuscation
    return "simple_" + (pin + "wt_salt_2026").split("").reduce((a,c)=>a+c.charCodeAt(0),0).toString(16);
  }
}

function checkSession() {
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (s && Date.now() - s.ts < SESSION_TTL) return true;
  } catch(e) {}
  return false;
}

function setSession() {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ts: Date.now()}));
}

function initPin() {
  const storedHash = localStorage.getItem(PIN_HASH_KEY);
  const overlay = document.getElementById("pin-overlay");
  overlay.style.display = "flex"; // always show first
  if (!storedHash) {
    pinMode = "set_first";
    document.getElementById("pin-msg").textContent = "No PIN set — enter a new 4-digit PIN";
    return;
  }
  if (checkSession()) {
    unlockApp();
    return;
  }
  pinMode = "check";
  document.getElementById("pin-msg").textContent = "Enter your PIN to continue";
}

function pinPress(n) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += n;
  updateDots(pinBuffer.length);
  if (pinBuffer.length === 4) setTimeout(() => handlePinComplete(), 150);
}

function pinClear(all=false) {
  pinBuffer = all ? "" : pinBuffer.slice(0,-1);
  updateDots(pinBuffer.length);
  document.getElementById("pin-error").textContent = "";
}

function updateDots(n) {
  for (let i=0;i<4;i++) document.getElementById("d"+i).classList.toggle("filled", i<n);
}

async function handlePinComplete() {
  const hash = await hashPin(pinBuffer);
  if (pinMode === "check") {
    const stored = localStorage.getItem(PIN_HASH_KEY);
    if (hash === stored) { setSession(); unlockApp(); }
    else { document.getElementById("pin-error").textContent = "Wrong PIN, try again"; pinBuffer=""; updateDots(0); }
  } else if (pinMode === "set_first") {
    pinConfirm = pinBuffer;
    pinBuffer = "";
    updateDots(0);
    pinMode = "set_confirm";
    document.getElementById("pin-msg").textContent = "Confirm your PIN";
  } else if (pinMode === "set_confirm") {
    if (pinBuffer === pinConfirm) {
      localStorage.setItem(PIN_HASH_KEY, hash);
      setSession();
      unlockApp();
    } else {
      document.getElementById("pin-error").textContent = "PINs don't match, start again";
      pinBuffer = ""; pinConfirm = ""; pinMode = "set_first";
      updateDots(0);
      document.getElementById("pin-msg").textContent = "Enter a new 4-digit PIN";
    }
  }
}

function unlockApp() {
  const overlay = document.getElementById("pin-overlay");
  overlay.style.display = "none";
  overlay.style.visibility = "hidden";
  overlay.style.pointerEvents = "none";
  initApp();
}

// ── STORAGE (localStorage cache + Supabase sync) ──────────────────────────────
const load = (k,d) => { try{return JSON.parse(localStorage.getItem(k))??d;}catch(e){return d;} };
const save = (k,v) => localStorage.setItem(k,JSON.stringify(v));

let transactions = load("wt_tx",[]);
let investments  = load("wt_inv",[]);
let savings      = load("wt_sav",{name:"Savings Account",balance:0,rate:0});
let isSyncing    = false;

const saveTx  = () => { save("wt_tx",  transactions); syncToSupabase(); };
const saveInv = () => { save("wt_inv", investments);  syncToSupabase(); };
const saveSav = () => { save("wt_sav", savings);      syncToSupabase(); };

function setSyncIndicator(state, msg="") {
  const el = document.getElementById("syncIndicator");
  if (!el) return;
  el.className = "sync-indicator" + (state==="syncing"?" syncing":state==="error"?" error":"");
  el.textContent = state==="syncing"?"⟳ Syncing…":state==="ok"?"✓ Synced":state==="error"?"⚠ Offline — cached":state==="offline"?"📵 Offline":msg;
}

async function syncToSupabase() {
  if (!sb) { setSyncIndicator("offline"); toast("⚠️ Supabase not initialized"); return; }
  setSyncIndicator("syncing");
  try {
    const [r1, r2, r3] = await Promise.all([
      sb.from("transactions").upsert({id:"main", data: transactions, updated_at: new Date().toISOString()}),
      sb.from("investments").upsert({id:"main",  data: investments,  updated_at: new Date().toISOString()}),
      sb.from("savings").upsert({id:"main",      data: savings,      updated_at: new Date().toISOString()}),
    ]);
    const errors = [r1.error, r2.error, r3.error].filter(Boolean);
    if (errors.length) {
      console.error("Sync errors:", errors);
      setSyncIndicator("error");
      toast("⚠️ Sync failed: " + errors[0].message);
    } else {
      setSyncIndicator("ok");
    }
  } catch(e) {
    console.error("Sync exception:", e);
    setSyncIndicator("error");
    toast("⚠️ Sync error: " + e.message);
  }
}

async function loadFromSupabase() {
  if (!sb) { setSyncIndicator("offline"); return false; }
  setSyncIndicator("syncing");
  try {
    const [txRes, invRes, savRes] = await Promise.all([
      sb.from("transactions").select("data").eq("id","main").single(),
      sb.from("investments").select("data").eq("id","main").single(),
      sb.from("savings").select("data").eq("id","main").single(),
    ]);
    // Log errors but don't block — fall back to localStorage
    if (txRes.error)  console.warn("tx load error:",  txRes.error.message);
    if (invRes.error) console.warn("inv load error:", invRes.error.message);
    if (savRes.error) console.warn("sav load error:", savRes.error.message);

    // Only overwrite local data if Supabase returned something valid
    if (txRes.data?.data  !== undefined) { transactions = txRes.data.data  ?? []; save("wt_tx",  transactions); }
    if (invRes.data?.data !== undefined) { investments  = invRes.data.data  ?? []; save("wt_inv", investments); }
    if (savRes.data?.data !== undefined) { savings      = savRes.data.data  ?? {name:"Savings Account",balance:0,rate:0}; save("wt_sav", savings); }

    const anyError = txRes.error || invRes.error || savRes.error;
    if (anyError) {
      setSyncIndicator("error");
      toast("⚠️ Load error: " + (txRes.error||invRes.error||savRes.error).message);
      return false;
    }
    setSyncIndicator("ok");
    return true;
  } catch(e) {
    console.error("Load exception:", e);
    setSyncIndicator("error");
    toast("⚠️ Load error: " + e.message);
    return false;
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = n => "€" + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
const fmtDate = d => new Date(d+"T12:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const thisMonth = () => new Date().toISOString().slice(0,7);
const toast = (msg,ms=2500) => { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),ms); };

// ── SAVINGS BALANCE ENGINE ────────────────────────────────────────────────────
function applyToSavings(amount) {
  savings.balance = Math.max(0, savings.balance + amount);
  saveSav();
}

// ── PRICE FETCHING ────────────────────────────────────────────────────────────
const YF_PROXIES = [
  ticker => `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`,
  ticker => `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`,
];
const CORS_WRAPPERS = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
];

async function fetchPrice(ticker) {
  for (const buildYF of YF_PROXIES) {
    for (const wrap of CORS_WRAPPERS) {
      try {
        const res = await fetch(wrap(buildYF(ticker)), {signal: AbortSignal.timeout(6000)});
        if (!res.ok) continue;
        const raw = await res.json();
        const text = raw.contents ?? JSON.stringify(raw);
        const parsed = typeof text === "string" ? JSON.parse(text) : text;
        const price = parsed?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (price) return price;
      } catch(e) { continue; }
    }
  }
  return null;
}

async function refreshAllPrices(silent=false) {
  const btn = document.getElementById("refreshBtn");
  if (btn) btn.classList.add("spinning");
  const tickers = investments.filter(i=>i.ticker);
  if (!tickers.length) {
    if (btn) btn.classList.remove("spinning");
    if (!silent) toast("⚠️ No tickers set — add a Yahoo ticker to your assets");
    return;
  }
  let updated = 0;
  for (let i=0; i<investments.length; i++) {
    if (!investments[i].ticker) continue;
    const p = await fetchPrice(investments[i].ticker);
    if (p !== null) { investments[i].currentPrice = p; updated++; }
  }
  saveInv();
  if (btn) btn.classList.remove("spinning");
  if (!silent) toast(updated > 0 ? `✅ Updated ${updated} price(s)` : "⚠️ Prices unavailable — check connection or tickers");
  const activePage = document.querySelector(".page.active")?.id;
  if (activePage === "page-portfolio") renderPortfolio();
  if (activePage === "page-dashboard") renderDashboard();
}

// ── RECURRING BUY PROCESSOR ───────────────────────────────────────────────────
function processRecurringBuys() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const todayYM  = todayStr.slice(0,7);
  const todayDay = today.getDate();
  let anyChange = false;

  investments.forEach((inv, idx) => {
    if (!inv.recurAmount || inv.recurAmount <= 0 || !inv.recurCycle) return;

    if (inv.recurCycle === "monthly") {
      const targetDay = inv.recurDay || 1;
      if (todayDay !== targetDay) return;
      if (inv.lastRecurBuyYM === todayYM) return;
      executeBuy(idx, todayStr);
      investments[idx].lastRecurBuyYM = todayYM;
      anyChange = true;

    } else if (inv.recurCycle === "yearly") {
      const startDate = inv.recurStartDate || (todayStr.slice(0,4) + "-01-01");
      if (todayStr.slice(5) !== startDate.slice(5)) return;
      if (inv.lastRecurBuyYM === todayYM) return;
      executeBuy(idx, todayStr);
      investments[idx].lastRecurBuyYM = todayYM;
      anyChange = true;

    } else if (inv.recurCycle === "weekly") {
      if (!inv.lastRecurBuyDate) {
        investments[idx].lastRecurBuyDate = todayStr;
        anyChange = true;
        return;
      }
      const last = new Date(inv.lastRecurBuyDate + "T12:00:00");
      if (Math.floor((today - last) / 86400000) < 7) return;
      executeBuy(idx, todayStr);
      investments[idx].lastRecurBuyDate = todayStr;
      anyChange = true;
    }
  });

  if (anyChange) { saveInv(); saveTx(); }
}

function executeBuy(idx, dateStr) {
  const inv = investments[idx];
  const price = inv.currentPrice || inv.buyPrice || 1;
  const newUnits = inv.recurAmount / price;
  const totalUnits = (inv.units || 0) + newUnits;
  const totalCost  = (inv.units || 0) * (inv.buyPrice || 0) + inv.recurAmount;
  investments[idx].units    = totalUnits;
  investments[idx].buyPrice = totalUnits > 0 ? totalCost / totalUnits : inv.buyPrice;
  applyToSavings(-inv.recurAmount);
  transactions.unshift({
    id: Date.now() + Math.random(),
    type: "expense",
    amount: inv.recurAmount,
    date: dateStr,
    desc: "Auto-buy: " + inv.name,
    cat: "📈 Investment Buy",
    auto: true
  });
}

// ── CRYPTO INTEREST ───────────────────────────────────────────────────────────
function processCryptoInterest() {
  const todayStr = new Date().toISOString().slice(0,10);
  const thisM = thisMonth();
  investments.forEach((inv, idx) => {
    if (!inv.interestRate || inv.assetType !== "crypto") return;
    if (inv.lastInterestMonth === thisM) return;
    const value = inv.units * inv.currentPrice;
    const monthlyInterest = value * inv.interestRate / 100 / 12;
    if (monthlyInterest <= 0) return;
    investments[idx].lastInterestMonth = thisM;
    investments[idx].units = (inv.units||0) + monthlyInterest / (inv.currentPrice||1);
    transactions.unshift({
      id: Date.now() + Math.random(),
      type: "income", amount: monthlyInterest,
      date: todayStr, desc: "Interest: " + inv.name,
      incomeType: "investment_return", auto: true
    });
  });
  saveInv(); saveTx();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  document.querySelectorAll("nav button")[{dashboard:0,transactions:1,add:2,portfolio:3,report:4}[id]].classList.add("active");
  ({dashboard:renderDashboard,transactions:renderTransactions,add:renderAdd,portfolio:renderPortfolio,report:renderReport})[id]?.();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const tm = thisMonth();
  const txM = transactions.filter(t=>t.date.slice(0,7)===tm);
  const income = txM.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expenses = txM.filter(t=>t.type!=="income").reduce((s,t)=>s+t.amount,0);
  const subsMonthly = transactions.filter(t=>t.type==="subscription").reduce((s,t)=>s+(t.recurCycle==="yearly"?t.amount/12:t.recurCycle==="weekly"?t.amount*4.33:t.amount),0);
  const totalInv = investments.reduce((s,i)=>s+i.units*i.currentPrice,0);
  const annualInterest = savings.balance * savings.rate / 100;
  document.getElementById("page-dashboard").innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">Savings balance</div><div class="value green">${fmt(savings.balance)}</div><div class="sub">${savings.rate>0?savings.rate+"% p.a. → "+fmt(annualInterest/12)+"/mo":""}</div></div>
      <div class="card"><div class="label">Income this month</div><div class="value green">${fmt(income)}</div></div>
      <div class="card"><div class="label">Expenses this month</div><div class="value red">${fmt(expenses)}</div></div>
      <div class="card"><div class="label">Net this month</div><div class="value ${income-expenses>=0?"green":"red"}">${income-expenses>=0?"+":"-"}${fmt(income-expenses)}</div></div>
      <div class="card"><div class="label">Subscriptions/mo</div><div class="value blue">${fmt(subsMonthly)}</div></div>
      <div class="card"><div class="label">Portfolio value</div><div class="value blue">${fmt(totalInv)}</div></div>
    </div>
    <div class="section"><h2>Recent Transactions</h2>${txTableHTML(transactions.slice(0,8),false)||'<p class="empty">No transactions yet</p>'}</div>`;
}

// ── TRANSACTIONS ──────────────────────────────────────────────────────────────
function renderTransactions() {
  const cats = ["",...EXPENSE_CATS,"📈 Investment Buy"].map(c=>`<option value="${c}">${c||"All categories"}</option>`).join("");
  document.getElementById("page-transactions").innerHTML = `
    <div class="section">
      <h2>All Transactions</h2>
      <div class="filter-bar">
        <select id="filterType" onchange="filterTx()"><option value="">All types</option><option value="expense">Expense</option><option value="income">Income</option><option value="subscription">Subscription</option></select>
        <select id="filterCat" onchange="filterTx()">${cats}</select>
        <input type="month" id="filterMonth" onchange="filterTx()"/>
      </div>
      <div id="bulk-bar" style="display:none;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:8px">
        <span id="bulk-count" style="font-size:13px;font-weight:600;color:var(--accent)"></span>
        <button class="btn danger sm" onclick="bulkDelete()">🗑 Delete selected</button>
        <button class="btn ghost sm" onclick="clearSelection()">Cancel</button>
      </div>
      <div id="tx-table"></div>
    </div>`;
  filterTx();
}

function clearSelection() {
  document.querySelectorAll(".tx-check").forEach(c=>c.checked=false);
  const ca=document.getElementById("checkAll"); if(ca) ca.checked=false;
  updateBulkBar();
}

function filterTx() {
  const ft=document.getElementById("filterType")?.value||"";
  const fc=document.getElementById("filterCat")?.value||"";
  const fm=document.getElementById("filterMonth")?.value||"";
  let txs=[...transactions];
  if(ft) txs=txs.filter(t=>t.type===ft);
  if(fc) txs=txs.filter(t=>t.cat===fc);
  if(fm) txs=txs.filter(t=>t.date.slice(0,7)===fm);
  document.getElementById("tx-table").innerHTML = txTableHTML(txs, true, true);
  updateBulkBar();
}

function txTableHTML(txs, showDel=false, showCheck=false) {
  if (!txs.length) return '<p class="empty">No transactions found</p>';
  return `<table>
    <thead><tr>
      ${showCheck ? '<th><input type="checkbox" id="checkAll" onchange="toggleCheckAll(this)"/></th>' : ""}
      <th>Date</th><th>Description</th><th>Type</th><th>Category</th>
      <th style="text-align:right">Amount</th>
      ${showDel ? "<th></th>" : ""}
    </tr></thead>
    <tbody>
      ${txs.map(t=>`<tr>
        ${showCheck ? `<td><input type="checkbox" class="tx-check" value="${t.id}" onchange="updateBulkBar()"/></td>` : ""}
        <td>${fmtDate(t.date)}</td>
        <td>${t.desc}${t.auto?'<span style="font-size:10px;color:var(--muted);"> auto</span>':" "}</td>
        <td><span class="badge ${t.type}">${t.type}</span></td>
        <td style="font-size:12px">${t.cat||(t.incomeType?INCOME_TYPES[t.incomeType]:"—")}</td>
        <td style="text-align:right;font-weight:600" class="${t.type==="income"?"tag-income":"tag-expense"}">${t.type==="income"?"+":"-"}${fmt(t.amount)}</td>
        ${showDel?`<td><button class="btn danger sm" onclick="deleteTx(${JSON.stringify(t.id)})">✕</button></td>`:""}
      </tr>`).join("")}
    </tbody>
  </table>`;
}

function toggleCheckAll(cb) {
  document.querySelectorAll(".tx-check").forEach(c=>{c.checked=cb.checked;});
  updateBulkBar();
}

function updateBulkBar() {
  const checked=document.querySelectorAll(".tx-check:checked");
  const bar=document.getElementById("bulk-bar"); if(!bar) return;
  if(checked.length>0){ bar.style.display="flex"; document.getElementById("bulk-count").textContent=checked.length+" selected"; }
  else bar.style.display="none";
}

function bulkDelete() {
  const checked=[...document.querySelectorAll(".tx-check:checked")];
  if(!checked.length) return;
  if(!confirm(`Delete ${checked.length} transaction(s)? Savings balance will be reversed.`)) return;
  checked.forEach(cb=>{
    const tx=transactions.find(t=>String(t.id)===String(cb.value));
    if(!tx) return;
    if(tx.type==="income") applyToSavings(-tx.amount); else applyToSavings(tx.amount);
    transactions=transactions.filter(t=>String(t.id)!==String(cb.value));
  });
  saveTx();
  filterTx();
  toast(`✅ Deleted ${checked.length} transaction(s) and reversed balance`);
}

function deleteTx(id) {
  const tx=transactions.find(t=>String(t.id)===String(id));
  if(!tx||!confirm("Delete this transaction?")) return;
  if(tx.type==="income") applyToSavings(-tx.amount); else applyToSavings(tx.amount);
  transactions=transactions.filter(t=>String(t.id)!==String(id));
  saveTx(); filterTx();
  toast("Transaction deleted");
}

// ── ADD TRANSACTION ───────────────────────────────────────────────────────────
function renderAdd() {
  const catOpts=EXPENSE_CATS.map(c=>`<option value="${c}">${c}</option>`).join("");
  document.getElementById("page-add").innerHTML=`
    <div class="section" style="max-width:560px;margin:0 auto">
      <h2>Add Transaction</h2>
      <form class="grid" id="addForm" onsubmit="handleAdd(event)">
        <div><label>Type</label>
          <select id="f-type" onchange="toggleAddFields()" required>
            <option value="expense">Expense</option>
            <option value="subscription">Subscription (recurring)</option>
            <option value="income">Income</option>
          </select></div>
        <div id="f-catWrap"><label>Category</label><select id="f-cat" required>${catOpts}</select></div>
        <div id="f-incWrap" style="display:none"><label>Income type</label>
          <select id="f-incType">${Object.entries(INCOME_TYPES).map(([v,l])=>`<option value="${v}">${l}</option>`).join("")}</select></div>
        <div><label>Amount (€)</label><input type="number" id="f-amount" step="0.01" min="0.01" required/></div>
        <div><label>Date</label><input type="date" id="f-date" required/></div>
        <div class="full"><label>Description</label><input type="text" id="f-desc" placeholder="Brief note…" required/></div>
        <div id="f-recurWrap" class="full" style="display:none">
          <label>Billing cycle</label>
          <select id="f-recur"><option value="monthly">Monthly</option><option value="yearly">Yearly</option><option value="weekly">Weekly</option></select></div>
        <div class="full" style="display:flex;gap:10px;justify-content:flex-end">
          <button type="button" class="btn ghost" onclick="showPage('transactions')">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>`;
  document.getElementById("f-date").value=new Date().toISOString().slice(0,10);
  toggleAddFields();
}

function toggleAddFields() {
  const t=document.getElementById("f-type").value;
  document.getElementById("f-catWrap").style.display=t==="income"?"none":"";
  document.getElementById("f-incWrap").style.display=t==="income"?"":"none";
  document.getElementById("f-recurWrap").style.display=t==="subscription"?"":"none";
}

function handleAdd(e) {
  e.preventDefault();
  const t=document.getElementById("f-type").value;
  const amount=parseFloat(document.getElementById("f-amount").value);
  transactions.unshift({
    id:Date.now(), type:t, amount,
    date:document.getElementById("f-date").value,
    desc:document.getElementById("f-desc").value,
    cat:t!=="income"?document.getElementById("f-cat").value:null,
    incomeType:t==="income"?document.getElementById("f-incType").value:null,
    recurCycle:t==="subscription"?document.getElementById("f-recur").value:null,
  });
  saveTx();
  if(t==="income") applyToSavings(amount); else applyToSavings(-amount);
  toast("✅ Transaction saved");
  showPage("transactions");
}

// ── PORTFOLIO ─────────────────────────────────────────────────────────────────

  const pnl=totalInv-totalCost;
  const annualInterest=investments.filter(i=>i.assetType==="crypto"&&i.interestRate).reduce((s,i)=>s+(i.units*i.currentPrice)*i.interestRate/100,0);

  document.getElementById("page-portfolio").innerHTML=`
    <div class="cards">
      <div class="card"><div class="label">Total portfolio</div><div class="value blue">${fmt(totalInv)}</div></div>
      <div class="card"><div class="label">Stocks / ETFs / Bonds</div><div class="value blue">${fmt(investments.filter(i=>i.assetType!=="crypto").reduce((s,i)=>s+i.units*i.currentPrice,0))}</div></div>
      <div class="card"><div class="label">Crypto</div><div class="value blue">${fmt(investments.filter(i=>i.assetType==="crypto").reduce((s,i)=>s+i.units*i.currentPrice,0))}</div></div>
      <div class="card"><div class="label">Unrealized P&L</div><div class="value ${pnl>=0?"green":"red"}">${pnl>=0?"+":"-"}${fmt(pnl)}</div></div>
      <div class="card"><div class="label">Savings balance</div><div class="value green">${fmt(savings.balance)}</div></div>
      <div class="card"><div class="label">Crypto staking/yr</div><div class="value green">${fmt(annualInterest)}</div><div class="sub">${fmt(annualInterest/12)}/mo</div></div>
    </div>
    <div class="section">
      <h2>⚙️ Savings Account</h2>
      <div class="section-sub">All expenses and income flow through this balance automatically.</div>
      <form class="grid" onsubmit="updateSavings(event)">
        <div><label>Account name</label><input id="s-name" value="${savings.name}"/></div>
        <div><label>Current balance (€)</label><input type="number" id="s-bal" step="0.01" value="${savings.balance}"/></div>
        <div><label>Annual interest rate (%)</label><input type="number" id="s-rate" step="0.01" value="${savings.rate}"/></div>
        <div style="display:flex;align-items:flex-end"><button class="btn" type="submit">Update</button></div>
      </form>
    </div>
    <div class="section">
      <h2>📈 Investments</h2>
      <form class="grid" id="invForm" onsubmit="handleAddInv(event)" style="margin-bottom:16px">
        <div><label>Name</label><input id="i-name" placeholder="e.g. Vanguard FTSE All-World" required/></div>
        <div><label>Yahoo ticker</label><input id="i-ticker" placeholder="e.g. VWCE.DE or BTC-EUR"/></div>
        <div><label>Asset type</label>
          <select id="i-type" onchange="document.getElementById('i-intWrap').style.display=this.value==='crypto'?'':'none'">
            <option value="etf">ETF</option><option value="stock">Stock</option>
            <option value="crypto">Crypto</option><option value="bond">Bond</option><option value="other">Other</option>
          </select></div>
        <div><label>Units / Shares</label><input type="number" id="i-units" step="0.0001" min="0" value="0" required/></div>
        <div><label>Avg buy price (€)</label><input type="number" id="i-buy" step="0.01" min="0" required/></div>
        <div><label>Current price (€)</label><input type="number" id="i-cur" step="0.01" min="0" required/></div>
        <div id="i-intWrap" style="display:none" class="full"><label>Staking interest rate % p.a.</label><input type="number" id="i-int" step="0.01" min="0" value="0"/></div>
        <div class="full" style="border-top:1px solid var(--border);padding-top:12px">
          <label style="font-weight:600;color:var(--text);font-size:13px">⟳ Recurring buy (auto-deducted from savings)</label>

        <div><label>Amount per period (€)</label><input type="number" id="i-ramont" step="0.01" min="0" value="0"/></div>

function renderInvList() {
  if (!investments.length) return '<p class="empty">No investments yet</p>';
  const stocks=investments.map((inv,idx)=>({inv,idx})).filter(({inv})=>inv.assetType!=="crypto");
  const cryptos=investments.map((inv,idx)=>({inv,idx})).filter(({inv})=>inv.assetType==="crypto");
  const rowHTML=({inv,idx})=>{
    const val=inv.units*inv.currentPrice,cost=inv.units*inv.buyPrice,pnl=val-cost;
    const pct=cost>0?((pnl/cost)*100).toFixed(2):"0.00";
    const recurLabel=inv.recurAmount?`${fmt(inv.recurAmount)} ${inv.recurCycle}`:"";
    return `<div class="prow">
      <div>
        <div class="name">${inv.name} <span class="chip">${inv.assetType}</span></div>
        <div class="sub2">${inv.units.toFixed(4)} units · avg ${fmt(inv.buyPrice)} · ${inv.ticker?"<b>"+inv.ticker+"</b>":"no ticker"}</div>
        ${inv.interestRate?`<div class="sub2"><span class="ibadge">${inv.interestRate}% p.a. staking</span></div>`:""}
        ${recurLabel?`<div class="sub2">⟳ Auto-buy ${recurLabel}</div>`:""}
      </div>
      <div style="text-align:right">
        <div class="price">${fmt(val)}</div>
        <div class="chg ${pnl>=0?"pos":"neg"}">${pnl>=0?"+":"-"}${fmt(pnl)} (${pct}%)</div>
        <div style="font-size:11px;color:var(--muted)">@ ${fmt(inv.currentPrice)} now</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <input type="number" step="0.01" value="${inv.currentPrice}" style="width:100px;font-size:13px" onchange="updateInvPrice(${idx},this.value)" title="Update price"/>
        <button class="btn danger sm" onclick="deleteInv(${idx})">✕ Remove</button>
      </div>
    </div>`;
  };
  const totalStocks=stocks.reduce((s,{inv})=>s+inv.units*inv.currentPrice,0);
  const totalCrypto=cryptos.reduce((s,{inv})=>s+inv.units*inv.currentPrice,0);
  const stocksSec=stocks.length?`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-weight:700;font-size:14px">📊 Stocks, ETFs & Bonds</span>
      <span style="font-weight:600;color:var(--accent)">${fmt(totalStocks)}</span>
    </div>${stocks.map(rowHTML).join("")}`:"";
  const cryptoSec=cryptos.length?`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:${stocks.length?20:4}px;margin-bottom:10px;border-top:${stocks.length?"2px solid var(--border)":"none"};padding-top:${stocks.length?16:0}px">
      <span style="font-weight:700;font-size:14px">₿ Crypto</span>
      <span style="font-weight:600;color:var(--accent)">${fmt(totalCrypto)}</span>
    </div>${cryptos.map(rowHTML).join("")}`:"";
  return stocksSec+cryptoSec;
}

function handleAddInv(e) {
  e.preventDefault();
  const recurAmount=parseFloat(document.getElementById("i-ramont").value)||0;
  const assetType=document.getElementById("i-type").value;
  investments.push({
    name:document.getElementById("i-name").value,
    ticker:document.getElementById("i-ticker").value.trim().toUpperCase(),
    assetType,
    units:parseFloat(document.getElementById("i-units").value)||0,
    buyPrice:parseFloat(document.getElementById("i-buy").value)||0,
    currentPrice:parseFloat(document.getElementById("i-cur").value)||0,
    interestRate:assetType==="crypto"?parseFloat(document.getElementById("i-int").value)||0:0,
    recurAmount, recurCycle:document.getElementById("i-rcycle").value,
    recurDay:parseInt(document.getElementById("i-rday").value)||1,
    lastRecurBuyYM:null, lastRecurBuyDate:null, lastInterestMonth:null,
  });
  saveInv();
  const initCost=(parseFloat(document.getElementById("i-units").value)||0)*(parseFloat(document.getElementById("i-buy").value)||0);
  if(initCost>0) applyToSavings(-initCost);
  document.getElementById("invForm").reset();
  document.getElementById("inv-list").innerHTML=renderInvList();
  toast("✅ Investment added");
}

function updateInvPrice(idx,val){ investments[idx].currentPrice=parseFloat(val)||0; saveInv(); document.getElementById("inv-list").innerHTML=renderInvList(); }
function deleteInv(idx){ if(!confirm("Remove this investment?"))return; investments.splice(idx,1); saveInv(); document.getElementById("inv-list").innerHTML=renderInvList(); toast("Removed"); }
function updateSavings(e){ e.preventDefault(); savings.name=document.getElementById("s-name").value; savings.balance=parseFloat(document.getElementById("s-bal").value)||0; savings.rate=parseFloat(document.getElementById("s-rate").value)||0; saveSav(); toast("✅ Savings updated"); }

// ── REPORT ────────────────────────────────────────────────────────────────────
function renderReport() {
  const months=[...new Set(transactions.map(t=>t.date.slice(0,7)))].sort().reverse();
  if(!months.includes(thisMonth())) months.unshift(thisMonth());
  document.getElementById("page-report").innerHTML=`
    <div class="month-sel"><b>Monthly Report</b>
      <select id="repMonth" onchange="renderReportBody()">${months.map(m=>`<option value="${m}">${m}</option>`).join("")}</select>
    </div>
    <div id="rep-body"></div>`;
  renderReportBody();
}

function renderReportBody() {
  const m=document.getElementById("repMonth").value||thisMonth();
  const txs=transactions.filter(t=>t.date.slice(0,7)===m);
  const income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expenses=txs.filter(t=>t.type!=="income").reduce((s,t)=>s+t.amount,0);
  const subsMonthly=transactions.filter(t=>t.type==="subscription").reduce((s,t)=>s+(t.recurCycle==="yearly"?t.amount/12:t.recurCycle==="weekly"?t.amount*4.33:t.amount),0);
  const incMap={};
  txs.filter(t=>t.type==="income").forEach(t=>{const k=INCOME_TYPES[t.incomeType]||t.incomeType; incMap[k]=(incMap[k]||0)+t.amount;});
  const expMap={};
  txs.filter(t=>t.type!=="income").forEach(t=>{expMap[t.cat]=(expMap[t.cat]||0)+t.amount;});
  const subs=transactions.filter(t=>t.type==="subscription");
  document.getElementById("rep-body").innerHTML=`
    <div class="cards">
      <div class="card"><div class="label">Total income</div><div class="value green">${fmt(income)}</div></div>
      <div class="card"><div class="label">Total expenses</div><div class="value red">${fmt(expenses)}</div></div>
      <div class="card"><div class="label">Net</div><div class="value ${income-expenses>=0?"green":"red"}">${income-expenses>=0?"+":"-"}${fmt(income-expenses)}</div></div>
      <div class="card"><div class="label">Subscriptions/mo</div><div class="value blue">${fmt(subsMonthly)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="section"><h2>Income by type</h2>
        <table><thead><tr><th>Type</th><th style="text-align:right">Amount</th></tr></thead><tbody>
          ${Object.entries(incMap).map(([k,v])=>`<tr><td>${k}</td><td style="text-align:right" class="tag-income">${fmt(v)}</td></tr>`).join("")||'<tr><td colspan="2" class="empty">No income</td></tr>'}
        </tbody></table></div>
      <div class="section"><h2>Expenses by category</h2>
        <table><thead><tr><th>Category</th><th style="text-align:right">Amount</th></tr></thead><tbody>
          ${Object.entries(expMap).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${k}</td><td style="text-align:right" class="tag-expense">${fmt(v)}</td></tr>`).join("")||'<tr><td colspan="2" class="empty">No expenses</td></tr>'}
        </tbody></table></div>
    </div>
    <div class="section"><h2>Active subscriptions</h2>
      <table><thead><tr><th>Name</th><th>Cycle</th><th style="text-align:right">Amount</th></tr></thead><tbody>
        ${subs.map(s=>`<tr><td>${s.desc}</td><td>${s.recurCycle}</td><td style="text-align:right;font-weight:600">${fmt(s.amount)}</td></tr>`).join("")||'<tr><td colspan="3" class="empty">No subscriptions</td></tr>'}
      </tbody></table></div>
    <div class="section"><h2>All transactions</h2>${txs.length?txTableHTML(txs,false):'<p class="empty">No transactions this month</p>'}</div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function initApp() {
  // Init Supabase client safely
  initSupabase();
  // Load from Supabase first (overrides localStorage cache if online)
  await loadFromSupabase();
  processRecurringBuys();
  processCryptoInterest();
  renderDashboard();
  if (investments.some(i=>i.ticker)) refreshAllPrices(true);
  // Listen for online/offline
  window.addEventListener("online", () => {
    if (!sb) initSupabase();
    setSyncIndicator("syncing");
    loadFromSupabase().then(() => { syncToSupabase(); renderDashboard(); });
  });
  window.addEventListener("offline", () => setSyncIndicator("offline"));
}

// Start with PIN check
initPin();
}); // end window.load

  <div class="pin-box">
    <div style="font-size:36px;margin-bottom:10px">💰</div>

    <p id="pin-msg">Enter your PIN to continue</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
